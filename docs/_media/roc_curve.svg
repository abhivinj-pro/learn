<svg width="100%" viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg"> <!-- Axes --> <line x1="60" y1="20" x2="60" y2="165" stroke="#B4B2A9" stroke-width="1"/> <line x1="60" y1="165" x2="320" y2="165" stroke="#B4B2A9" stroke-width="1"/> <!-- Grid lines --> <line x1="60" y1="93" x2="320" y2="93" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/> <line x1="190" y1="20" x2="190" y2="165" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/> <!-- Random classifier diagonal --> <line x1="60" y1="165" x2="320" y2="20" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 4"/> <text x="282" y="42" font-size="10" fill="#888780" font-family="sans-serif">random</text> <!-- Perfect model --> <polyline points="60,165 60,20 320,20" fill="none" stroke="#9FE1CB" stroke-width="1.2" stroke-dasharray="4 3"/> <text x="66" y="17" font-size="10" fill="#0F6E56" font-family="sans-serif">perfect (AUC=1.0)</text> <!-- Good model curve with shading --> <path d="M60,165 C80,155 90,100 120,65 S180,25 320,20" fill="#B5D4F4" fill-opacity="0.3" stroke="#185FA5" stroke-width="2"/> <text x="140" y="58" font-size="10" fill="#185FA5" font-family="sans-serif" font-weight="500">good model (~0.85)</text> <!-- Axis labels -->

<text x="190" y="182" text-anchor="middle" font-size="10" fill="#888780" font-family="sans-serif">FPR → False Positive Rate (1 − Specificity)</text> <text x="22" y="93" text-anchor="middle" font-size="10" fill="#888780" font-family="sans-serif" transform="rotate(-90,22,93)">TPR = Recall</text>

<!-- Tick labels -->

<text x="60" y="178" text-anchor="middle" font-size="10" fill="#888780" font-family="sans-serif">0</text> <text x="320" y="178" text-anchor="middle" font-size="10" fill="#888780" font-family="sans-serif">1</text> <text x="50" y="168" text-anchor="end" font-size="10" fill="#888780" font-family="sans-serif">0</text> <text x="50" y="23" text-anchor="end" font-size="10" fill="#888780" font-family="sans-serif">1</text>

<!-- Divider --> <line x1="345" y1="20" x2="345" y2="185" stroke="#D3D1C7" stroke-width="0.5"/> <!-- Insight text -->

<text x="365" y="40" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">Each point on the curve</text> <text x="365" y="57" font-size="11" fill="#888780" font-family="sans-serif">= one classification threshold</text> <text x="365" y="85" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">Move threshold lower →</text> <text x="365" y="102" font-size="11" fill="#888780" font-family="sans-serif">catch more positives (↑ recall)</text> <text x="365" y="118" font-size="11" fill="#888780" font-family="sans-serif">but more false alarms (↑ FPR)</text> <text x="365" y="146" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">AUC = shaded area</text> <text x="365" y="163" font-size="11" fill="#888780" font-family="sans-serif">= P(pos ranked above neg)</text> </svg>